; Preserves the PHP tuning from the original LEMP host (see /etc/php/8.2/fpm/php.ini
; on the old VPS) so upload limits and execution time behave the same.
memory_limit = 256M
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 30

; Route PHP's mail()/wp_mail() through msmtp, which relays to a real SMTP
; provider (see .env: SMTP_HOST etc.) instead of trying to send directly
; from the VPS IP, which gets spam-filtered/blocked by major providers.
sendmail_path = "/usr/bin/msmtp -t"
