# nginx sidecar for benoitchantre.com — classic WordPress layout.
# Serves static files directly; proxies PHP to the wp (php-fpm) container.
# Caddy (the shared edge proxy) forwards HTTP here; this container never
# terminates TLS itself.

# Caddy terminates TLS and forwards plain HTTP with an X-Forwarded-Proto
# header. Translate that into the `HTTPS` fastcgi param so PHP's is_ssl()
# sees the request as secure (otherwise WP plugins/redirects that check
# is_ssl() directly can misbehave or loop).
map $http_x_forwarded_proto $fastcgi_https {
    default "";
    https   "on";
}

server {
    listen 80;
    server_name benoitchantre.com;
    root /var/www/html;
    index index.php;

    client_max_body_size 128M;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Deny direct access to sensitive files even though Caddy already blocks
    # these at the edge — defense in depth in case this container is ever
    # reached another way.
    location ~ /\.ht     { deny all; }
    location = /wp-config.php { deny all; }
    location ~* \.(sql|log)$ { deny all; }
    location = /xmlrpc.php { deny all; }

    # Dependency-manager/VCS metadata and editor junk — see Caddyfile's
    # wp_hardening snippet for why; duplicated here as defense in depth.
    location ~* /(composer\.(json|lock)|package(-lock)?\.json|wp-cli\.yml)$ { deny all; }
    location ~ /\.git             { deny all; }
    location ~* \.(swp|DS_Store)$ { deny all; }
    location ~ ~$                 { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wp:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60s;
        fastcgi_param HTTPS $fastcgi_https;
    }

    # Cache static assets aggressively at the browser; Surge handles the
    # full-page HTML caching separately.
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|css|js|woff2?|ttf|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }
}
