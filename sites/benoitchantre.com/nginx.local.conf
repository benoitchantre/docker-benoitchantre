# Local-testing variant of nginx.conf: identical to production except
# `server_name` matches the local-only domain (see infra/README.local.md)
# instead of the real TLD. There's only one server block in this file, so
# nginx would in fact route correctly either way — this exists so the vhost
# doesn't silently claim to be answering for the production hostname during
# a local rehearsal.
#
# Usage: bind-mount this over nginx.conf via docker-compose.local.yml.

map $http_x_forwarded_proto $fastcgi_https {
    default "";
    https   "on";
}

server {
    listen 80;
    server_name benoitchantre.test;
    root /var/www/html;
    index index.php;

    client_max_body_size 128M;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    location ~ /\.ht     { deny all; }
    location = /wp-config.php { deny all; }
    location ~* \.(sql|log)$ { deny all; }
    location = /xmlrpc.php { deny all; }

    location ~* /(composer\.(json|lock)|package(-lock)?\.json|wp-cli\.yml)$ { deny all; }
    location ~ /\.git             { deny all; }
    location ~* \.(swp|DS_Store)$ { deny all; }
    location ~ ~$                 { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wp:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60s;
        fastcgi_param HTTPS $fastcgi_https;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|css|js|woff2?|ttf|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }
}
