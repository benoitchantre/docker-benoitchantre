; OPcache tuning for a small (1 vCPU / 2 GB) box running a single WP site.
; validate_timestamps=0 means PHP file changes won't be picked up until the
; container restarts (`docker compose restart wp`) or opcache is reset —
; deliberate trade-off for performance on a mostly-static, pinned-image site.
opcache.enable=1
opcache.memory_consumption=96
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.revalidate_freq=0
