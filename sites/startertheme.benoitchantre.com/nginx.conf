# nginx sidecar for startertheme.benoitchantre.com — classic WordPress layout.
# Serves static files directly; proxies PHP to the wp (php-fpm) container.
# Caddy (the shared edge proxy) forwards HTTP here; this container never
# terminates TLS itself.

# Caddy terminates TLS and forwards plain HTTP with an X-Forwarded-Proto
# header. Translate that into the `HTTPS` fastcgi param so PHP's is_ssl()
# sees the request as secure (otherwise WP plugins/redirects that check
# is_ssl() directly can misbehave or loop).
map $http_x_forwarded_proto $fastcgi_https {
    default "";
    https   "on";
}

server {
    listen 80;
    server_name startertheme.benoitchantre.com;
    root /var/www/html;
    index index.php;

    client_max_body_size 128M;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # This site is IP-allowlisted end to end — ported from the original
    # VPS's nginx vhost. Caddy (the proxy in front of this container) is
    # the only thing that ever connects here, so trust it as the source of
    # the real client IP.
    # Docker assigns a subnet per user-defined network at creation time, so
    # this can't be hardcoded reliably (the `web` network Caddy connects
    # over is 192.168.147.0/24 today, but that's not guaranteed stable
    # across recreates). Trust the whole RFC1918 + Docker's default pool
    # ranges instead — safe here because this container has no public IP of
    # its own; only Caddy (on `web`) can reach it at all.
    #
    # Use Cf-Connecting-Ip rather than X-Forwarded-For: Cloudflare sometimes
    # forwards its own X-Forwarded-For to Caddy (in addition to
    # CF-Connecting-IP), and Caddy's reverse_proxy appends its own peer to
    # whatever X-Forwarded-For it already saw. That produces a two-value
    # header like "213.55.213.218, <cloudflare-edge-ip>" — and since
    # Cloudflare's edge IPs aren't in set_real_ip_from below, real_ip_recursive
    # stops at that untrusted rightmost hop and nginx resolves the wrong IP,
    # causing spurious 403s for legitimate visitors. Cf-Connecting-Ip is set
    # once, by Cloudflare, to the single true client IP, so there's no chain
    # to walk and no ambiguity.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header Cf-Connecting-Ip;

    # Applied at server level, not inside `location /`: nginx re-matches
    # locations from scratch on the internal try_files redirect to
    # index.php, so an allow/deny placed only in `location /` would NOT
    # apply to the PHP handler below — every WordPress page load would
    # bypass the restriction entirely. Server-level allow/deny covers every
    # location, including the fastcgi one.
    allow 213.55.213.218;              # Home
    allow 46.14.176.169;               # BuxumLunic
    allow 83.228.241.231;              # Web server
    allow 2001:1600:18:202::38f;       # Web server
    deny all;

    # Deny direct access to sensitive files even though Caddy already blocks
    # these at the edge — defense in depth in case this container is ever
    # reached another way.
    location ~ /\.ht     { deny all; }
    location = /wp-config.php { deny all; }
    location ~* \.(sql|log)$ { deny all; }
    location = /xmlrpc.php { deny all; }

    # Dependency-manager/VCS metadata and editor junk — see Caddyfile's
    # wp_hardening snippet for why; duplicated here as defense in depth.
    location ~* /(composer\.(json|lock)|package(-lock)?\.json|wp-cli\.yml)$ { deny all; }
    location ~ /\.git             { deny all; }
    location ~* \.(swp|DS_Store)$ { deny all; }
    location ~ ~$                 { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wp:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60s;
        fastcgi_param HTTPS $fastcgi_https;
    }

    # Cache static assets aggressively at the browser; Surge handles the
    # full-page HTML caching separately.
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|css|js|woff2?|ttf|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }
}
