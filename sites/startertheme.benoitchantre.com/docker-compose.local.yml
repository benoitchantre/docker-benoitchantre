# Local-testing override. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Swaps in nginx.local.conf (server_name: startertheme.test instead of the
# real TLD, production IP-allowlist dropped) so the local rehearsal never
# claims to be answering for the production hostname and isn't blocked by
# an allowlist built for the real VPS's visitors. Pair with
# caddy/Caddyfile.local, which routes startertheme.test to this stack.

services:
  web:
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./wp-content:/var/www/html/wp-content:ro
      - wp_core:/var/www/html
