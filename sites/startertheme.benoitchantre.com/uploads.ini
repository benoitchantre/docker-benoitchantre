; Matches the tuning used for the other site / the original LEMP host.
memory_limit = 256M
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 30

; Route PHP's mail()/wp_mail() through msmtp, relaying to a real SMTP
; provider (see .env: SMTP_HOST etc.) instead of sending directly from the
; VPS IP, which gets spam-filtered/blocked by major providers.
sendmail_path = "/usr/bin/msmtp -t"
